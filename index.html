<!doctype html>
<html>

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>

<title>Commander Threat Counter</title>

<style>

:root{
  --bg:#000;
  --panel:#101820;
  --panel2:#1b2533;
  --btn:#1f2a3a;
  --btn2:#223046;
  --text:#fff;
  --muted:rgba(255,255,255,.75);
  --border:rgba(255,255,255,.08);
  --threat:#baff2a;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* ===============================
   HEADER
=============================== */

.top-section{
  text-align:center;
  padding:10px 6px 4px 6px;
}

.logo{
  font-size:20px;
  font-weight:800;
}

.ad-banner{
  margin-top:6px;
  font-size:12px;
  background:#111;
  padding:6px;
  border-radius:6px;
}

/* ===============================
   GRID
=============================== */

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  height:calc(100vh - 110px);
  gap:4px;
  padding:4px;
}

.player{
  background:var(--panel);
  border-radius:12px;
  padding:6px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border:1px solid var(--border);
}

.life{
  text-align:center;
  font-size:38px;
  font-weight:900;
}

button{
  border:none;
  border-radius:8px;
  padding:6px 0;
  font-size:14px;
  font-weight:700;
  background:var(--btn);
  color:var(--text);
}

/* ===============================
   JUDGE OVERLAY
=============================== */

#judgeTab{
position:fixed;
right:0;
top:45%;
background:#9CFF00;
padding:12px 16px;
font-weight:bold;
cursor:pointer;
border-radius:8px 0 0 8px;
z-index:10000;
color:black;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
}

#judgeTabIcon{
font-size:20px;
}

#judgePanel{
position:fixed;
right:-360px;
top:0;
width:340px;
height:100%;
background:#0b0f16;
color:white;
padding:20px;
transition:right .3s;
z-index:9999;
box-shadow:-6px 0 20px rgba(0,0,0,.6);
}

#judgePanel.open{
right:0;
}

#judgeInput{
width:100%;
height:90px;
margin-top:10px;
font-size:16px;
}

.judgeBtn{
margin-top:10px;
padding:10px;
background:#9CFF00;
border:none;
font-weight:bold;
cursor:pointer;
margin-right:5px;
}

</style>

</head>

<body>

<div class="top-section">
  <div class="logo">YOUR BUSINESS LOGO</div>
  <div class="ad-banner">Advertising Banner Space</div>
</div>

<div class="grid" id="grid"></div>

<script>

/* ===============================
   BATTLE SIMULATOR
=============================== */

const START = { life:40 }

let players=[]

function createPlayer(index){

return{
id:index,
name:"Seat "+(index+1),
life:START.life
}

}

for(let i=0;i<4;i++){

players.push(createPlayer(i))

}

function render(){

const grid=document.getElementById("grid")

grid.innerHTML=""

players.forEach((p,i)=>{

let div=document.createElement("div")

div.className="player"

div.innerHTML=`

<div>${p.name}</div>

<div class="life">${p.life}</div>

<button onclick="players[${i}].life--;render()">-</button>

<button onclick="players[${i}].life++;render()">+</button>

`

grid.appendChild(div)

})

}

render()

</script>

<!-- ===============================
POLYHEDRON JUDGE
=============================== -->

<div id="judgeTab">

<div id="judgeTabIcon">💬</div>

<div>JUDGE</div>

</div>


<div id="judgePanel">

<h2>Judge</h2>

<div id="judgeStatus">judge online</div>

<div id="judgeResponse"></div>

<textarea id="judgeInput" placeholder="what seems to be the issue?"></textarea>

<br>

<button class="judgeBtn" onclick="askJudge()">Ask</button>

<button class="judgeBtn" onclick="clearJudge()">Clear</button>

</div>


<script>

(function(){

const judgeTab=document.getElementById("judgeTab")

const judgePanel=document.getElementById("judgePanel")

judgeTab.onclick=function(){

judgePanel.classList.toggle("open")

}

async function askJudge(){

const question=document.getElementById("judgeInput").value

document.getElementById("judgeResponse").innerText="thinking..."

try{

const res=await fetch(

"https://polyhedron-judge.onrender.com/judge",

{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({question:question})

}

)

const data=await res.json()

document.getElementById("judgeResponse").innerText=data.answer

}

catch(err){

document.getElementById("judgeStatus").innerText="judge offline"

document.getElementById("judgeResponse").innerText="server unreachable"

}

}

window.askJudge=askJudge

window.clearJudge=function(){

document.getElementById("judgeInput").value=""

document.getElementById("judgeResponse").innerText=""

}

})();

</script>

</body>
</html>
