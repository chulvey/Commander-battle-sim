<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Commander Threat Counter v1.3</title>

<style>
:root{
  --bg:#000;
  --panel:#101820;
  --panel2:#1b2533;
  --btn:#1f2a3a;
  --btn2:#223046;
  --text:#fff;
  --muted:rgba(255,255,255,.75);
  --border:rgba(255,255,255,.08);
  --threat:#baff2a;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--text);
  -webkit-tap-highlight-color: transparent;
}

/* ===============================
   ORIGINAL SIMULATOR STYLES
   =============================== */

.top-section{
  text-align:center;
  padding:10px 6px 4px 6px;
}

.logo{
  font-size:20px;
  font-weight:800;
}

.ad-banner{
  margin-top:6px;
  font-size:12px;
  background:#111;
  padding:6px;
  border-radius:6px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  height:calc(100vh - 110px);
  gap:4px;
  padding:4px;
}

.player{
  background:var(--panel);
  border-radius:12px;
  padding:6px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  border:1px solid var(--border);
}

/* ===============================
   JUDGE OVERLAY
   =============================== */

#judgeTab{
position:fixed;
right:0;
top:40%;
background:#9CFF00;
padding:10px 14px;
font-weight:bold;
cursor:pointer;
border-radius:6px 0 0 6px;
z-index:9999;
color:black;
text-align:center;
}

#judgeTabIcon{
font-size:18px;
line-height:18px;
}

#judgePanel{
position:fixed;
right:-26%;
top:0;
width:25%;
height:100%;
background:#0b0f16;
color:white;
padding:20px;
transition:right .3s;
z-index:9998;
}

#judgePanel.open{
right:0;
}

#judgeInput{
width:100%;
height:90px;
margin-top:10px;
font-size:16px;
}

.judgeBtn{
margin-top:10px;
padding:10px;
background:#9CFF00;
border:none;
font-weight:bold;
cursor:pointer;
margin-right:5px;
}

</style>
</head>

<body>

<div class="top-section">
  <div class="logo">YOUR BUSINESS LOGO</div>
  <div class="ad-banner">Advertising Banner Space</div>
</div>

<div class="grid" id="grid"></div>

<script>

/* ===============================
   ORIGINAL SIMULATOR SCRIPT
   =============================== */

const START = { life:40, cards:7, permanents:0, mana:0, poison:0 };

let players = [];

function createPlayer(index){
  return {
    id:index,
    name:"Seat "+(index+1),
    life:START.life
  };
}

for(let i=0;i<4;i++){
players.push(createPlayer(i));
}

function render(){

const grid=document.getElementById("grid");
grid.innerHTML="";

players.forEach((p,i)=>{

let div=document.createElement("div");

div.className="player";

div.innerHTML=`
<div>${p.name}</div>
<div style="font-size:40px;text-align:center">${p.life}</div>
<button onclick="players[${i}].life--;render()">-</button>
<button onclick="players[${i}].life++;render()">+</button>
`;

grid.appendChild(div);

});

}

render();

</script>

<!-- ===============================
     JUDGE OVERLAY HTML
     =============================== -->

<div id="judgeTab">
<div id="judgeTabIcon">💬</div>
<div>JUDGE</div>
</div>

<div id="judgePanel">

<h2>Judge</h2>

<div id="judgeStatus">judge online</div>

<div id="judgeResponse"></div>

<textarea id="judgeInput" placeholder="what seems to be the issue?"></textarea>

<br>

<button class="judgeBtn" onclick="askJudge()">Ask</button>
<button class="judgeBtn" onclick="clearJudge()">Clear</button>

</div>

<script>

/* ===============================
   JUDGE SCRIPT
   =============================== */

const judgeTab=document.getElementById("judgeTab")
const judgePanel=document.getElementById("judgePanel")

judgeTab.onclick=()=>{
judgePanel.classList.toggle("open")
}

document.addEventListener("click",e=>{
if(!judgePanel.contains(e.target)&&e.target!==judgeTab){
judgePanel.classList.remove("open")
}
})

async function askJudge(){

const question=document.getElementById("judgeInput").value

document.getElementById("judgeResponse").innerText="thinking..."

try{

const res=await fetch(
"https://polyhedron-judge.onrender.com/judge",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:question})
}
)

if(!res.ok){
throw new Error("server error")
}

const data=await res.json()

document.getElementById("judgeResponse").innerText=data.answer

}catch(err){

document.getElementById("judgeStatus").innerText="judge offline"
document.getElementById("judgeResponse").innerText="server unreachable"

}

}

function clearJudge(){

document.getElementById("judgeInput").value=""
document.getElementById("judgeResponse").innerText=""

}

</script>

</body>
</html>
