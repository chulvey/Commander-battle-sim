<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Polyhedron Judge Online</title>

<style>

body {
font-family: Arial;
margin:0;
padding:0;
}

/* judge tab */

#judgeTab{
position:fixed;
right:0;
top:40%;
background:#9CFF00;
padding:10px 14px;
font-weight:bold;
cursor:pointer;
border-radius:6px 0 0 6px;
z-index:9999;
}

/* panel */

#judgePanel{
position:fixed;
right:-26%;
top:0;
width:25%;
height:100%;
background:#0b0f16;
color:white;
padding:20px;
transition:right .3s;
z-index:9998;
}

#judgePanel.open{
right:0;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
}

button{
margin-top:10px;
padding:10px;
background:#9CFF00;
border:none;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<h3>Polyhedron Judge Online</h3>

<div id="judgeTab">JUDGE</div>

<div id="judgePanel">

<h2>Judge!</h2>

<div id="judgeResponse">judge online</div>

<textarea id="judgeInput" placeholder="what seems to be the issue?"></textarea>

<br>

<button onclick="askJudge()">Ask</button>
<button onclick="clearJudge()">Clear</button>

</div>

<script>

const judgeTab=document.getElementById("judgeTab");
const judgePanel=document.getElementById("judgePanel");

judgeTab.onclick=()=>{
judgePanel.classList.toggle("open");
};

document.addEventListener("click",e=>{
if(!judgePanel.contains(e.target) && e.target!==judgeTab){
judgePanel.classList.remove("open");
}
});

async function askJudge(){

const question=document.getElementById("judgeInput").value;

try{

const res=await fetch(
"https://polyhedron-judge.onrender.com/ask",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question})
}
);

const data=await res.json();

document.getElementById("judgeResponse").innerText=
data.answer || "No response";

}
catch(err){

document.getElementById("judgeResponse").innerText="judge offline";

}

}

function clearJudge(){
document.getElementById("judgeInput").value="";
document.getElementById("judgeResponse").innerText="";
}

</script>

</body>
</html>
