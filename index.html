<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{
background:#000814;
color:white;
font-family:Arial;
margin:0;
padding:40px;
}
h1{
font-size:48px;
margin-bottom:10px;
}
#status{
font-size:26px;
margin-bottom:20px;
}
textarea{
width:100%;
height:120px;
font-size:20px;
padding:15px;
border-radius:12px;
border:none;
}
button{
margin-top:15px;
margin-right:15px;
padding:15px 30px;
font-size:20px;
background:#9EF01A;
border:none;
border-radius:6px;
}
#answer{
margin-top:25px;
font-size:22px;
line-height:1.4;
}
</style>
</head>

<body>

<h1>Judge!</h1>

<div id="status">checking server...</div>

<textarea id="question" placeholder="what seems to be the issue?"></textarea>

<br>

<button onclick="askJudge()">Ask</button>
<button onclick="clearBox()">Clear</button>

<div id="answer"></div>

<script>

const status = document.getElementById("status")
const answer = document.getElementById("answer")

const SERVER = "https://polyhedron-judge.onrender.com"

async function checkServer(){
try{
const res = await fetch(SERVER)
if(res.ok){
status.innerText = "judge online"
}else{
status.innerText = "judge offline"
}
}catch{
status.innerText = "judge offline"
}
}

async function askJudge(){

const q = document.getElementById("question").value
if(!q){return}

status.innerText = "judge thinking..."

try{

const res = await fetch(
SERVER + "/ask",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({question:q})
}
)

const data = await res.json()

answer.innerText = data.answer
status.innerText = "judge online"

}catch(e){

status.innerText = "judge offline"
answer.innerText = "server unreachable"

}

}

function clearBox(){
document.getElementById("question").value=""
answer.innerText=""
}

checkServer()

</script>

</body>
</html>
