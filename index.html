<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Polyhedron Judge Online</title>

<style>

body{
background:#020b18;
font-family:Arial;
color:white;
padding:30px;
}

h1{
font-size:48px;
margin-bottom:0;
}

.subtitle{
font-size:24px;
color:#cfd8e3;
margin-bottom:30px;
}

textarea{
width:100%;
height:140px;
font-size:18px;
padding:15px;
border-radius:10px;
border:none;
}

button{
background:#a8e63a;
color:#2563eb;
font-size:22px;
border:none;
padding:16px 30px;
border-radius:10px;
margin-right:20px;
margin-top:20px;
}

#answer{
margin-top:30px;
font-size:22px;
line-height:1.4;
}

</style>

</head>

<body>

<h1>Polyhedron Judge</h1>
<div class="subtitle">judge online</div>

<textarea id="question" placeholder="Ask a rules question..."></textarea>

<br>

<button onclick="askJudge()">Ask</button>
<button onclick="clearBox()">Clear</button>

<div id="answer"></div>

<script>

async function askJudge(){

const question = document.getElementById("question").value;

if(!question){
return;
}

document.getElementById("answer").innerText="Judge thinking...";

try{

const response = await fetch(
"https://polyhedron-judge.onrender.com/judge",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
question:question
})
}
);

const data = await response.json();

document.getElementById("answer").innerText=data.answer;

}catch(e){

document.getElementById("answer").innerText="Judge service unavailable.";

}

}

function clearBox(){
document.getElementById("question").value="";
document.getElementById("answer").innerText="";
}

</script>

</body>

</html>
